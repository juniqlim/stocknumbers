<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stocknumbers — 한국주식 펀더멘털</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { --line:#e5e7eb; --muted:#6b7280; --neg:#dc2626; --pos:#16a34a; --hl:#fffbeb; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
         margin:0; color:#111; background:#fafafa; }
  header { padding:24px 20px 8px; }
  h1 { margin:0; font-size:22px; }
  .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  section { padding:8px 20px 24px; }
  h2 { font-size:15px; margin:20px 0 6px; }
  .secunit { color:var(--muted); font-size:12px; margin:0 0 8px; }
  .wrap { overflow-x:auto; }
  table { border-collapse:collapse; width:100%; background:#fff; font-size:13px; }
  th, td { padding:8px 12px; border-bottom:1px solid var(--line); text-align:right;
           white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; position:sticky; left:0; background:#fff; }
  thead th { background:#f3f4f6; color:var(--muted); font-weight:600; }
  td.neg { color:var(--neg); }
  td.pos { color:var(--pos); }
  tr.hl td { background:var(--hl); font-weight:600; }
  tr.hl td:first-child { background:var(--hl); }
  tr.sep td { padding:0; height:6px; background:#fafafa; border:none; }
  .unit { color:var(--muted); font-size:12px; margin:8px 20px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .cl { color:var(--muted); font-size:12px; }
  .cv { font-size:18px; font-weight:600; margin-top:2px; }
  #picker, #ccy { margin-top:10px; font-size:14px; padding:6px 10px; border:1px solid var(--line);
            border-radius:8px; background:#fff; color:#111; max-width:100%; }
  #ccy { margin-left:6px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; }
  a.card { display:flex; justify-content:space-between; align-items:center; padding:12px 14px;
           border:1px solid #ddd; border-radius:8px; background:#fff; color:#111;
           text-decoration:none; font-weight:600; }
  a.card:hover { border-color:#2563eb; background:#f5f8ff; }
  a.card .code { color:#888; font-weight:400; font-size:.85em; }
</style>
</head>
<body>
<header>
  <h1 id="title">로딩…</h1>
  <select id="picker" onchange="location.search='?code='+this.value"></select>
  <select id="ccy" onchange="setCcy(this.value)"></select>
</header>
<main id="main"></main>

<script>
const STOCK = new URLSearchParams(location.search).get("code");   // 없으면 종목 목록(랜딩)
let DATA, QUOTE, ANNUAL, QUARTER, BALANCE, EXTRA;

const FX = 1380;            // USD/KRW 근사 (2026)
let DISPLAY_CCY = "KRW";    // 표시 통화 (종목 native로 초기화)

// 종목 선택 셀렉트박스 (data/companies.json 매니페스트 기반)
fetch("data/companies.json").then(r=>r.json()).then(list=>{
  const sel = document.getElementById("picker");
  if (STOCK && !list.some(c=>c.code===STOCK)) list = [{code:STOCK, name:STOCK, sector:"기타"}, ...list];
  const bySector = {};                                   // 섹터별 그룹핑
  list.forEach(c => (bySector[c.sector||"기타"] ||= []).push(c));
  const sectors = Object.keys(bySector).sort((a,b)=>a.localeCompare(b,"ko"));
  const grp = sec => bySector[sec].sort((a,b)=>a.name.localeCompare(b.name,"ko"));
  sel.innerHTML = (STOCK?"":`<option value="" disabled selected>종목 선택…</option>`)+
    sectors.map(sec => `<optgroup label="${sec}">`+
      grp(sec).map(c=>`<option value="${c.code}"${c.code===STOCK?" selected":""}>${c.name} (${c.code})</option>`).join("")+
    `</optgroup>`).join("");
  if (!STOCK){ renderLanding(sectors, grp); return; }     // 랜딩: 종목 목록
  const me = list.find(c=>c.code===STOCK);
  if (me) document.getElementById("title").textContent = `${me.name} (${me.code})`;
}).catch(()=>{ document.getElementById("picker").style.display = "none"; });

function renderLanding(sectors, grp){
  document.getElementById("title").textContent = "종목 목록";
  document.getElementById("ccy").style.display = "none";
  document.getElementById("main").innerHTML = sectors.map(sec =>
    `<section><h2>${sec}</h2><div class="grid">`+
    grp(sec).map(c=>`<a class="card" href="?code=${c.code}">${c.name} <span class="code">${c.code}</span></a>`).join("")+
    `</div></section>`).join("");
}

// ── 통화 표시 ────────────────────────────────────────────────
function nativeCcy(){ return (ANNUAL||QUARTER||BALANCE||{}).currency || "KRW"; }
function natValueUnit(){              // 종목 native 금액 단위 (USD는 백만$/십억$ 혼용)
  const o = ANNUAL||QUARTER||BALANCE||{};
  return o.value_unit || (o.currency==="USD" ? "십억$" : "억원");
}
function natUnit(nat){ return nat==="USD" ? natValueUnit() : "억원"; }
function dispUnit(nat){               // 현재 표시중인 금액 단위 라벨
  if (DISPLAY_CCY===nat) return natUnit(nat);
  if (DISPLAY_CCY==="USD") return "백만$";              // KRW종목 → 달러
  return natValueUnit()==="백만$" ? "억원" : "조원";    // USD종목 → 원화 (규모 따라)
}
const MONEY_DENY = new Set(["PER(연말)","PER"]);   // 숫자지만 금액 아님(배수)
function moneyCols(obj){
  if (obj.money_cols) return new Set(obj.money_cols);
  const set = new Set();                            // 추론: 순수 숫자 컬럼
  obj.headers.forEach((h,i)=>{
    if (i===0 || MONEY_DENY.has(h)) return;
    const cs = obj.rows.map(r=>r[i]).filter(c=>c && c!=="-");
    if (cs.length && cs.every(c=>/^[+-]?[\d,]+(\.\d+)?$/.test(c))) set.add(h);
  });
  return set;
}
function convVal(v, nat){             // 숫자값을 표시통화로 환산
  if (v===null || DISPLAY_CCY===nat) return v;
  if (nat==="KRW" && DISPLAY_CCY==="USD") return v*100/FX;   // 억원 → 백만$
  if (nat==="USD" && DISPLAY_CCY==="KRW"){                    // $ → 원화 (규모 따라 억/조)
    return natValueUnit()==="백만$" ? v*FX/100      // 백만$ → 억원
                                    : v*FX/1000;    // 십억$ → 조원
  }
  return v;
}
function convCell(c, nat){
  if (DISPLAY_CCY===nat) return c;
  const v = parseFloat(String(c).replace(/,/g,""));
  if (isNaN(v)) return c;
  const o = convVal(v, nat), a = Math.abs(o);
  return a<100 ? o.toFixed(1) : Math.round(o).toLocaleString("en-US");
}
function setCcy(v){ DISPLAY_CCY = v; render(); syncCcy(); }
function syncCcy(){
  const sel = document.getElementById("ccy");
  if (nativeCcy() !== "USD"){ sel.style.display = "none"; return; }  // 한국 종목은 달러 토글 불필요
  sel.style.display = "";
  sel.innerHTML = `<option value="USD">달러 $</option><option value="KRW">원화 ₩</option>`;
  sel.value = DISPLAY_CCY;
}

// 밸류에이션 카드 정의
const VAL = [
  { key:"price",          label:"현재가",     unit:"won" },
  { key:"market_value",   label:"시가총액",   unit:"eok" },
  { key:"per",            label:"PER",        unit:"x"   },
  { key:"pbr",            label:"PBR",        unit:"x"   },
  { key:"eps",            label:"EPS",        unit:"won" },
  { key:"bps",            label:"BPS",        unit:"won" },
  { key:"dividend_yield", label:"배당수익률", unit:"pct" },
  { key:"dividend",       label:"주당배당금", unit:"won" },
];

function fmtVal(v, unit){
  if (v === null || v === undefined) return "-";
  if (unit==="x")   return v.toLocaleString("ko-KR",{maximumFractionDigits:2})+"배";
  if (unit==="pct") return v.toLocaleString("ko-KR",{maximumFractionDigits:2})+"%";
  if (unit==="eok") return Math.round(v/1e8).toLocaleString("ko-KR")+"억";
  return Math.round(v).toLocaleString("ko-KR")+"원";
}

function valuationSection(){
  if (!QUOTE) return "";
  const cards = VAL.map(m =>
    `<div class="card"><div class="cl">${m.label}</div>`+
    `<div class="cv">${fmtVal(QUOTE[m.key], m.unit)}</div></div>`
  ).join("");
  const d = QUOTE.bizdate
    ? `${QUOTE.bizdate.slice(0,4)}-${QUOTE.bizdate.slice(4,6)}-${QUOTE.bizdate.slice(6,8)} 종가`
    : "";
  return `<section><h2>밸류에이션</h2>`+
    `<div class="secunit">${d} · 출처 네이버금융</div>`+
    `<div class="cards">${cards}</div></section>`;
}

// 연간 실적: data/<code>_annual.json 이 있으면 노트의 큐레이션 표를 그대로 렌더
function annualClass(cell){
  if (cell === "적자" || /^-\d/.test(cell) || /^~-/.test(cell)) return "neg";
  if (cell === "흑전" || /^\+/.test(cell)) return "pos";
  return "";
}

// 연도가 왼쪽 행, 지표가 위쪽 열인 year-row 표 (연간실적·재무상태표 공용)
function yearTable(obj){
  if (!obj) return "";
  const nat = obj.currency || "KRW", money = moneyCols(obj);
  const hl = new Set(obj.highlight || []);
  const head = obj.headers.map(h=>`<th>${h}</th>`).join("");
  const body = obj.rows.map(r => {
    const cells = r.map((c,i)=>{
      if (i===0) return "";
      const disp = money.has(obj.headers[i]) ? convCell(c, nat) : c;
      return `<td class="${annualClass(c)}">${disp}</td>`;   // 색은 원본 부호 기준
    }).join("");
    return `<tr class="${hl.has(r[0])?'hl':''}"><td>${r[0]}</td>${cells}</tr>`;
  }).join("");
  let cap = obj.unit || "";
  if (DISPLAY_CCY!==nat)                                   // 표시통화에 맞춰 캡션 단위 토큰 교체
    cap = cap.replace(/십억\$\(USD\)|백만\$\(USD\)|억원/, dispUnit(nat))
           + ` · 환율 ${FX.toLocaleString("ko-KR")}원/$`;
  return `<section><h2>${obj.title || ""}</h2>`+
    `<div class="secunit">${cap}</div>`+
    `<div class="wrap"><table><thead><tr>${head}</tr></thead>`+
    `<tbody>${body}</tbody></table></div></section>`;
}

// "1,846" "17.8%" "+53.2%" "~8%" "-22" → 숫자, "적자"/"흑전"/"-"/"" → null
function pnum(s){
  if (s == null) return null;
  s = String(s).replace(/,/g,"").replace(/%/g,"").replace(/[+~]/g,"").trim();
  if (s==="" || s==="-" || s==="적자" || s==="흑전") return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

const CHART_PALETTE = ["#2563eb","#dc2626","#16a34a","#d97706","#7c3aed","#0891b2",
  "#db2777","#65a30d","#475569","#ea580c","#0d9488","#9333ea","#e11d48","#4f46e5"];
const CHART_EOK = new Set(["매출","영업이익","순이익","영업CF","CAPEX","생산능력","FCF"]); // 막대(억원,좌축)
const CHART_LINE_EOK = new Set(["시총"]); // 선(억원,좌축)
const CHART_DEFAULT = new Set(["매출","영업이익","OPM"]); // 처음에 켜둘 지표

let CHART;
function buildChart(){
  if (!ANNUAL || typeof Chart === "undefined") return;
  const nat = ANNUAL.currency || "KRW";
  const labels = ANNUAL.rows.map(r => r[0]);
  const datasets = ANNUAL.headers.slice(1).map((h,i) => {
    const ci = i + 1, eok = CHART_EOK.has(h), lineEok = CHART_LINE_EOK.has(h);
    const money = eok || lineEok, color = CHART_PALETTE[i % CHART_PALETTE.length];
    return {
      label: h,
      data: ANNUAL.rows.map(r => { const v = pnum(r[ci]); return money ? convVal(v, nat) : v; }),
      type: eok ? "bar" : "line",
      yAxisID: money ? "y" : "y2",
      borderColor: color, backgroundColor: eok ? color+"cc" : color,
      tension: 0.2, spanGaps: true, borderWidth: eok ? 0 : 2, pointRadius: eok ? 0 : 2.5,
      hidden: !CHART_DEFAULT.has(h),
    };
  });
  if (CHART) CHART.destroy();
  CHART = new Chart(document.getElementById("annualChart"), {
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false, interaction: { mode: "index", intersect: false },
      scales: {
        y:  { position: "left",  title: { display: true, text: dispUnit(nat) } },
        y2: { position: "right", title: { display: true, text: "% · 배수" }, grid: { drawOnChartArea: false } },
      },
      plugins: { legend: { position: "bottom" } },
    },
  });
}

function chartSection(){
  if (!ANNUAL) return "";
  const u = dispUnit(ANNUAL.currency || "KRW");
  return `<section><h2>연간 추이</h2>`+
    `<div class="secunit">범례 클릭으로 지표 토글 · 막대=${u}(좌축), 선=%·배수(우축)</div>`+
    `<div style="position:relative;height:360px"><canvas id="annualChart"></canvas></div></section>`;
}

function render(){
  document.getElementById("main").innerHTML =
    valuationSection() + chartSection() + yearTable(ANNUAL) + yearTable(QUARTER) + yearTable(BALANCE) + yearTable(EXTRA);
  buildChart();
}

const grab = p => fetch(p).then(r=>r.ok?r.json():null).catch(()=>null);
if (STOCK) Promise.all([
  grab(`data/${STOCK}.json`),
  grab(`data/${STOCK}_quote.json`),
  grab(`data/${STOCK}_annual.json`),
  grab(`data/${STOCK}_quarter.json`),
  grab(`data/${STOCK}_balance.json`),
  grab(`data/${STOCK}_extra.json`),
]).then(([d, q, a, qt, b, ex])=>{
  DATA = d; QUOTE = q; ANNUAL = a; QUARTER = qt; BALANCE = b; EXTRA = ex;
  if (d && d.corp_name) document.getElementById("title").textContent = `${d.corp_name} (${d.stock_code})`;
  DISPLAY_CCY = nativeCcy();   // 종목 native 통화로 초기화
  syncCcy();
  render();
});
</script>
</body>
</html>
