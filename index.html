<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stocknumbers — 한국주식 펀더멘털</title>
<style>
  :root { --line:#e5e7eb; --muted:#6b7280; --neg:#dc2626; --pos:#16a34a; --hl:#fffbeb; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
         margin:0; color:#111; background:#fafafa; }
  header { padding:24px 20px 8px; }
  h1 { margin:0; font-size:22px; }
  .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  section { padding:8px 20px 24px; }
  h2 { font-size:15px; margin:20px 0 6px; }
  .secunit { color:var(--muted); font-size:12px; margin:0 0 8px; }
  .wrap { overflow-x:auto; }
  table { border-collapse:collapse; width:100%; background:#fff; font-size:13px; }
  th, td { padding:8px 12px; border-bottom:1px solid var(--line); text-align:right;
           white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; position:sticky; left:0; background:#fff; }
  thead th { background:#f3f4f6; color:var(--muted); font-weight:600; }
  td.neg { color:var(--neg); }
  td.pos { color:var(--pos); }
  tr.hl td { background:var(--hl); font-weight:600; }
  tr.hl td:first-child { background:var(--hl); }
  tr.sep td { padding:0; height:6px; background:#fafafa; border:none; }
  .unit { color:var(--muted); font-size:12px; margin:8px 20px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .cl { color:var(--muted); font-size:12px; }
  .cv { font-size:18px; font-weight:600; margin-top:2px; }
</style>
</head>
<body>
<header>
  <h1 id="title">로딩…</h1>
  <div class="sub" id="sub"></div>
</header>
<main id="main"></main>

<script>
const STOCK = new URLSearchParams(location.search).get("code") || "005930";
let DATA, PERIODS, QUOTE;

// 핵심지표 정의 (account_id 우선, 없으면 account_nm 매칭)
const KEY = [
  { id:"ifrs-full_Revenue", label:"매출액", hl:true },
  { calc:"rev_yoy", label:"매출 성장률", unit:"pct" },
  { id:"ifrs-full_GrossProfit", label:"매출총이익" },
  { id:"dart_OperatingIncomeLoss", label:"영업이익", hl:true },
  { calc:"opm", label:"영업이익률", unit:"pct" },
  { id:"ifrs-full_ProfitLoss", label:"당기순이익", hl:true },
  { calc:"npm", label:"순이익률", unit:"pct" },
  { id:"ifrs-full_BasicEarningsLossPerShare", label:"EPS", unit:"won" },
  { sep:true },
  { id:"ifrs-full_Assets", label:"자산총계" },
  { id:"ifrs-full_Liabilities", label:"부채총계" },
  { id:"ifrs-full_Equity", label:"자본총계", hl:true },
  { calc:"roe", label:"ROE", unit:"pct" },
  { calc:"debt", label:"부채비율", unit:"pct" },
  { sep:true },
  { nm:"영업활동현금흐름", label:"영업현금흐름", hl:true },
];

function lookup(sel, period){
  for (const sj of ["IS","BS","CF"]){
    for (const r of DATA.statements[sj]){
      if ((sel.id && r.account_id === sel.id) || (sel.nm && r.account_nm === sel.nm))
        return r[period];
    }
  }
  return null;
}

function calc(key, period){
  const at = sel => lookup(sel, period);
  const div = (a,b) => (a!==null && b) ? a/b*100 : null;
  const rev = at({id:"ifrs-full_Revenue"});
  if (key==="opm")  return div(at({id:"dart_OperatingIncomeLoss"}), rev);
  if (key==="npm")  return div(at({id:"ifrs-full_ProfitLoss"}), rev);
  if (key==="roe")  return div(at({id:"ifrs-full_ProfitLoss"}), at({id:"ifrs-full_Equity"}));
  if (key==="debt") return div(at({id:"ifrs-full_Liabilities"}), at({id:"ifrs-full_Equity"}));
  if (key==="rev_yoy"){
    const order = ["bfefrmtrm","frmtrm","thstrm"];
    const i = order.indexOf(period);
    if (i<=0) return null;
    const cur = at({id:"ifrs-full_Revenue"});
    const prev = lookup({id:"ifrs-full_Revenue"}, order[i-1]);
    return (cur!==null && prev) ? (cur-prev)/Math.abs(prev)*100 : null;
  }
  return null;
}

function fmt(v, unit){
  if (v === null || v === undefined) return ["-", ""];
  if (unit==="pct") return [v.toLocaleString("ko-KR",{maximumFractionDigits:1})+"%", v<0?"neg":""];
  if (unit==="won") return [Math.round(v).toLocaleString("ko-KR"), v<0?"neg":""];
  const e = v/1e8;
  return [e.toLocaleString("ko-KR",{maximumFractionDigits:1}), v<0?"neg":""];
}

function cols(){
  return (PERIODS.bfefrmtrm ? ["bfefrmtrm","frmtrm","thstrm"] : ["frmtrm","thstrm"]);
}

function table(headFirst, head, bodyRows){
  const cs = cols();
  return `<div class="wrap"><table>`+
    `<thead><tr><th>${headFirst}</th>${cs.map(c=>`<th>${PERIODS[c]}</th>`).join("")}</tr></thead>`+
    `<tbody>${bodyRows}</tbody></table></div>`;
}

function summarySection(){
  const cs = cols();
  const rows = KEY.map(m => {
    if (m.sep) return `<tr class="sep"><td colspan="${cs.length+1}"></td></tr>`;
    const cells = cs.map(c => {
      const v = m.calc ? calc(m.calc, c) : lookup(m, c);
      const [t,cls] = fmt(v, m.unit);
      return `<td class="${cls}">${t}</td>`;
    }).join("");
    return `<tr class="${m.hl?'hl':''}"><td>${m.label}</td>${cells}</tr>`;
  }).join("");
  return `<section><h2>핵심지표</h2>`+
    `<div class="secunit">단위: 억원 · 성장률/비율 % · EPS 원</div>`+
    table("지표", null, rows)+`</section>`;
}

// 밸류에이션 카드 정의
const VAL = [
  { key:"price",          label:"현재가",     unit:"won" },
  { key:"market_value",   label:"시가총액",   unit:"eok" },
  { key:"per",            label:"PER",        unit:"x"   },
  { key:"pbr",            label:"PBR",        unit:"x"   },
  { key:"eps",            label:"EPS",        unit:"won" },
  { key:"bps",            label:"BPS",        unit:"won" },
  { key:"dividend_yield", label:"배당수익률", unit:"pct" },
  { key:"dividend",       label:"주당배당금", unit:"won" },
];

function fmtVal(v, unit){
  if (v === null || v === undefined) return "-";
  if (unit==="x")   return v.toLocaleString("ko-KR",{maximumFractionDigits:2})+"배";
  if (unit==="pct") return v.toLocaleString("ko-KR",{maximumFractionDigits:2})+"%";
  if (unit==="eok") return Math.round(v/1e8).toLocaleString("ko-KR")+"억";
  return Math.round(v).toLocaleString("ko-KR")+"원";
}

function valuationSection(){
  if (!QUOTE) return "";
  const cards = VAL.map(m =>
    `<div class="card"><div class="cl">${m.label}</div>`+
    `<div class="cv">${fmtVal(QUOTE[m.key], m.unit)}</div></div>`
  ).join("");
  const d = QUOTE.bizdate
    ? `${QUOTE.bizdate.slice(0,4)}-${QUOTE.bizdate.slice(4,6)}-${QUOTE.bizdate.slice(6,8)} 종가`
    : "";
  return `<section><h2>밸류에이션</h2>`+
    `<div class="secunit">${d} · 출처 네이버금융</div>`+
    `<div class="cards">${cards}</div></section>`;
}

function render(){
  document.getElementById("main").innerHTML = valuationSection() + summarySection();
}

Promise.all([
  fetch(`data/${STOCK}.json`).then(r=>r.json()),
  fetch(`data/${STOCK}_quote.json`).then(r=>r.json()).catch(()=>null),
]).then(([d, q])=>{
  DATA = d; PERIODS = d.periods; QUOTE = q;
  document.getElementById("title").textContent = `${d.corp_name} (${d.stock_code})`;
  document.getElementById("sub").textContent =
    `${d.bsns_year} 사업연도 · ${d.fs_div==="CFS"?"연결":"개별"}재무제표`;
  render();
}).catch(e => document.getElementById("title").textContent = "데이터 없음: "+e);
</script>
</body>
</html>
